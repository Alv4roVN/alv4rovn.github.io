<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
    <defs>
        <linearGradient id="mem-bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#2b2b3d"/>
            <stop offset="100%" stop-color="#14141f"/>
        </linearGradient>
    </defs>
    <rect width="960" height="540" fill="url(#mem-bg)"/>

    <text x="60" y="80" font-family="Montserrat, Arial, sans-serif" font-size="38" font-weight="700" fill="#f5f2ea">Memory Allocators</text>
    <text x="60" y="115" font-family="Arial, sans-serif" font-size="19" fill="#a9b7c6">Linear / stack allocator built from scratch in C</text>

    <!-- memory buffer -->
    <g font-family="Menlo, Consolas, monospace">
        <rect x="130" y="170" width="700" height="90" rx="4" fill="none" stroke="#5f9ea0" stroke-width="2"/>
        <rect x="132" y="172" width="230" height="86" fill="#5f9ea0"/>
        <rect x="362" y="172" width="150" height="86" fill="#4c7d7f"/>
        <rect x="512" y="172" width="90" height="86" fill="#3a6062"/>

        <line x1="602" y1="150" x2="602" y2="280" stroke="#f5f2ea" stroke-width="2" stroke-dasharray="4 6"/>
        <text x="602" y="140" font-size="16" fill="#f5f2ea" text-anchor="middle">bump ptr</text>

        <text x="130" y="295" font-size="16" fill="#a9b7c6">0x0000</text>
        <text x="830" y="295" font-size="16" fill="#a9b7c6" text-anchor="end">0x1000</text>

        <text x="247" y="223" font-size="15" fill="#14141f" text-anchor="middle">alloc A</text>
        <text x="437" y="223" font-size="15" fill="#14141f" text-anchor="middle">alloc B</text>
        <text x="557" y="223" font-size="14" fill="#f5f2ea" text-anchor="middle">alloc C</text>
        <text x="716" y="223" font-size="15" fill="#a9b7c6" text-anchor="middle">free space</text>
    </g>

    <circle cx="860" cy="80" r="30" fill="#5f9ea0"/>
    <text x="860" y="91" font-size="24" font-weight="700" fill="#14141f" text-anchor="middle" font-family="Menlo, Consolas, monospace">C</text>
</svg>
